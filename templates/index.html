<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AztecVision — Détection de Glyphes Aztèques</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

  <header id="app-header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="16,2 30,9 30,23 16,30 2,23 2,9" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <polygon points="16,8 24,12 24,20 16,24 8,20 8,12" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <circle cx="16" cy="16" r="3" fill="currentColor"/>
            <line x1="16" y1="2" x2="16" y2="8" stroke="currentColor" stroke-width="1"/>
            <line x1="30" y1="9" x2="24" y2="12" stroke="currentColor" stroke-width="1"/>
            <line x1="30" y1="23" x2="24" y2="20" stroke="currentColor" stroke-width="1"/>
            <line x1="16" y1="30" x2="16" y2="24" stroke="currentColor" stroke-width="1"/>
            <line x1="2" y1="23" x2="8" y2="20" stroke="currentColor" stroke-width="1"/>
            <line x1="2" y1="9" x2="8" y2="12" stroke="currentColor" stroke-width="1"/>
          </svg>
        </div>
        <span class="brand-name">Aztec<span>Vision</span></span>
      </div>
    </div>

    <div class="header-center">
      <div class="conf-control">
        <label for="conf-slider">Confiance min.</label>
        <input type="range" id="conf-slider" min="1" max="99" value="25" step="1">
        <span id="conf-value">25%</span>
      </div>
      <div class="header-sep"></div>
      <label class="tiling-toggle" title="Découpe l'image en tuiles pour détecter les glyphes sur les planches entières">
        <input type="checkbox" id="tiling-toggle" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label-text">Mode Planche</span>
      </label>
    </div>

    <div class="header-right">
      <div class="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connexion…</span>
      </div>
    </div>
  </header>

  <!-- ========== UPLOAD VIEW ========== -->
  <div id="upload-view" class="view active">
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-inner">
        <div class="drop-glyph">
          <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="48,4 92,28 92,68 48,92 4,68 4,28" stroke="currentColor" stroke-width="1.2"/>
            <polygon points="48,18 78,35 78,61 48,78 18,61 18,35" stroke="currentColor" stroke-width="1"/>
            <polygon points="48,32 64,41.5 64,54.5 48,63 32,54.5 32,41.5" stroke="currentColor" stroke-width="0.8"/>
            <circle cx="48" cy="48" r="4" fill="currentColor"/>
            <line x1="48" y1="4"  x2="48" y2="18" stroke="currentColor" stroke-width="0.8"/>
            <line x1="92" y1="28" x2="78" y2="35" stroke="currentColor" stroke-width="0.8"/>
            <line x1="92" y1="68" x2="78" y2="61" stroke="currentColor" stroke-width="0.8"/>
            <line x1="48" y1="92" x2="48" y2="78" stroke="currentColor" stroke-width="0.8"/>
            <line x1="4"  y1="68" x2="18" y2="61" stroke="currentColor" stroke-width="0.8"/>
            <line x1="4"  y1="28" x2="18" y2="35" stroke="currentColor" stroke-width="0.8"/>
          </svg>
        </div>
        <h2 class="drop-title">Déposez votre image ici</h2>
        <p class="drop-sub">ou <button class="drop-browse" id="browse-btn">parcourez vos fichiers</button></p>
        <p class="drop-formats">PNG · JPG · JPEG · BMP · TIFF · WEBP</p>
        <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.bmp,.tif,.tiff,.webp">
      </div>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
    </div>
    <p class="upload-hint">Analyse de codex et manuscrits aztèques · 303 classes de glyphes</p>
  </div>

  <!-- ========== ANALYSIS VIEW ========== -->
  <div id="analysis-view" class="view">

    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>

      <!-- Zoom & Enhance Panel -->
      <div id="zoom-panel" class="zoom-panel hidden">
        <div class="zoom-header">
          <span class="zoom-header-label">Zoom & Enhance</span>
        </div>
        <canvas id="zoom-canvas"></canvas>
        <div class="zoom-info">
          <div class="zoom-class-name" id="zoom-class-name">—</div>
          <div class="zoom-conf-row">
            <span class="zoom-conf-label">Confiance</span>
            <div class="zoom-conf-bar">
              <div class="zoom-conf-fill" id="zoom-conf-fill"></div>
            </div>
            <span class="zoom-conf-value" id="zoom-conf-value">—</span>
          </div>
          <div class="zoom-bbox-info" id="zoom-bbox-info"></div>
        </div>
      </div>
    </div>

    <!-- Side Panel -->
    <div id="side-panel">
      <div class="side-header">
        <div class="side-stats">
          <div class="stat-block">
            <span class="stat-num" id="stat-detections">0</span>
            <span class="stat-label">détections</span>
          </div>
          <div class="stat-sep"></div>
          <div class="stat-block">
            <span class="stat-num" id="stat-time">—</span>
            <span class="stat-label">ms</span>
          </div>
        </div>
        <div id="tiling-badge" class="tiling-badge hidden">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="5" height="5" rx="1"/>
            <rect x="8" y="1" width="5" height="5" rx="1"/>
            <rect x="1" y="8" width="5" height="5" rx="1"/>
            <rect x="8" y="8" width="5" height="5" rx="1"/>
          </svg>
          Mode Planche actif
        </div>
        <button id="new-btn" class="action-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="8" y1="3" x2="8" y2="13"/>
            <line x1="3" y1="8" x2="13" y2="8"/>
          </svg>
          Nouvelle image
        </button>
      </div>

      <div class="section-label">
        <span>Glyphes détectés</span>
        <span id="det-count-badge" class="badge">0</span>
      </div>

      <div id="detection-list" class="detection-list">
        <!-- populated by app.js -->
      </div>

      <div class="side-footer">
        <button id="export-btn" class="export-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v8"/>
            <path d="M5 7l3 3 3-3"/>
            <path d="M3 12h10"/>
          </svg>
          Exporter JSON
        </button>
      </div>
    </div>

  </div>

  <!-- ========== LOADING OVERLAY ========== -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="loading-hex">
        <svg viewBox="0 0 60 60" fill="none">
          <polygon points="30,4 56,19 56,49 30,64 4,49 4,19"
                   stroke="currentColor" stroke-width="2"
                   stroke-dasharray="120" stroke-dashoffset="120"
                   class="hex-dash"/>
        </svg>
      </div>
      <p class="loading-title">Analyse en cours</p>
      <p class="loading-file" id="loading-filename"></p>
    </div>
  </div>

  <!-- ========== ERROR TOAST ========== -->
  <div id="error-toast" class="error-toast hidden">
    <svg viewBox="0 0 16 16" fill="currentColor" class="toast-icon">
      <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 3.5h1.5v4h-1.5v-4zm0 5.5h1.5V11.5h-1.5V10z"/>
    </svg>
    <span id="error-msg"></span>
    <button class="toast-close" id="toast-close">✕</button>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
